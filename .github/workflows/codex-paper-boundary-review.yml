name: Codex paper-boundary review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex-paper-boundary-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Check out pull request
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin \
            ${{ github.event.pull_request.base.ref }} \
            +refs/pull/${{ github.event.pull_request.number }}/head

      - name: Run Codex post-development review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: docs/codex/prompts/post-development-review.md
          output-file: codex-paper-boundary-review.md
          safety-strategy: drop-sudo
          sandbox: read-only
          codex-args: '["--ask-for-approval", "never"]'

  post-codex-review:
    runs-on: ubuntu-latest
    needs: codex-paper-boundary-review
    if: needs.codex-paper-boundary-review.outputs.final_message != ''

    permissions:
      pull-requests: write

    steps:
      - name: Post Codex review summary
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-paper-boundary-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
