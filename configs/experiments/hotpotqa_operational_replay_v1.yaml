{
  "config_version": "v1_matched_budget_only",
  "purpose": "extend_scoped_operational_evidence_without_claim_upgrade",
  "run_mode": "config_only_not_executed",
  "pilot_readiness_status": "ready_for_later_controlled_run",
  "dataset_sequence": {
    "primary": "HotpotQA",
    "deferred": [
      "FEVER_style_closed_label",
      "2WikiMultihopQA_deferred",
      "MuSiQue_deferred"
    ]
  },
  "datasets": {
    "primary": [
      "HotpotQA"
    ],
    "deferred": [
      "FEVER_style_closed_label",
      "2WikiMultihopQA_deferred",
      "MuSiQue_deferred"
    ]
  },
  "dataset": {
    "name": "HotpotQA",
    "task_family": "multi_hop_support_selection",
    "candidate_pools_path": "artifacts/benchmarks/hotpotqa_candidate_pools.jsonl",
    "split": "dev_distractor",
    "status": "ready_for_later_controlled_run"
  },
  "runner": {
    "run_id": "hotpotqa_operational_replay_v1",
    "output_dir": "artifacts/experiments/lapi6_hotpotqa_operational_replay_v1",
    "limit": 30,
    "evaluators": [
      "operational",
      "diagnostic_safety",
      "claim_ledger"
    ],
    "claim_mode": "shadow"
  },
  "budgets": {
    "initial": [
      512,
      1024
    ],
    "optional_after_pilot": [
      2048
    ]
  },
  "baselines": {
    "deployable": [
      "random_budget",
      "topk_relevance_or_token_budget",
      "mmr_density_greedy",
      "v12_cost_aware_diagnostic_policy_operational_only"
    ],
    "optional_after_pilot": [
      "seeded_augmented_greedy_operational_only",
      "pair_aware_local_search_operational_only",
      "adaptive_budget_router_operational_only"
    ],
    "non_deployable_upper_bound": [
      "gold_support_oracle_upper_bound"
    ]
  },
  "matched_budget_controls": {
    "compare_only_with_matched_candidate_pool": true,
    "hold_budget_fixed": true,
    "hold_prompt_hash_fixed": true,
    "hold_model_snapshot_fixed": true,
    "hold_endpoint_and_thinking_mode_fixed": true,
    "hold_decoding_policy_fixed": true,
    "budget_mismatch_action": "stop_fail_closed",
    "prompt_hash_drift_action": "stop_fail_closed"
  },
  "metrics": {
    "hard_operational": [
      "supporting_fact_recall",
      "evidence_recall",
      "selected_gold_support_packets",
      "selected_tokens",
      "quality_per_1k_tokens",
      "latency",
      "estimated_cost"
    ],
    "weak_diagnostic": [
      "judge_support_rate",
      "judge_insufficient_rate",
      "abstain_rate",
      "order_swap_agreement",
      "parse_failure_rate"
    ]
  },
  "cost_latency_ledger_fields": [
    "input_tokens",
    "output_tokens",
    "total_tokens",
    "estimated_cost",
    "latency_ms"
  ],
  "claim_ledger_fields": [
    "current_claim_level",
    "allowed_claims",
    "denied_claims",
    "claim_upgrade",
    "route_5_locked",
    "route_8_locked",
    "raw_response_stored"
  ],
  "claim_boundary": {
    "current_claim_level": "operational_utility_only/no_claim_upgrade",
    "claim_level": "scoped_operational_improvement_under_matched_budgets_only",
    "allowed_claims": [
      "scoped_operational_improvement_under_matched_budgets_only"
    ],
    "denied_claims": [
      "selector_superiority",
      "global_selector_superiority",
      "measurement_validation",
      "metric_bridge_support",
      "calibrated_proxy_supported",
      "vinfo_proxy_supported",
      "paper_evidence",
      "route_5_unlock",
      "route_8_unlock"
    ],
    "claim_upgrade": false,
    "route_5_locked": true,
    "route_8_locked": true,
    "raw_response_stored": false,
    "live_api_call_performed": false,
    "paper_evidence_eligible": false
  },
  "reporting_rules": {
    "compare_only_with_matched_candidate_pool_budget_prompt_and_model_snapshot": true,
    "report_oracle_only_as_non_deployable_upper_bound": true,
    "never_report_selector_superiority": true,
    "never_report_global_selector_superiority": true,
    "never_report_metric_bridge_support": true,
    "never_report_measurement_validation": true,
    "never_report_calibrated_proxy_support": true,
    "never_report_vinfo_proxy_support": true,
    "never_report_paper_evidence": true,
    "never_report_route_5_or_route_8_unlock": true
  },
  "stop_conditions": [
    "parse_failure_rate_exceeds_0_15",
    "budget_mismatch_detected",
    "prompt_hash_drift_detected",
    "claim_ledger_missing_or_incomplete",
    "candidate_pool_mismatch_detected",
    "model_snapshot_mismatch_detected",
    "live_api_call_attempted_without_explicit_approval",
    "raw_response_storage_detected"
  ],
  "raw_response_stored": false,
  "raw_api_responses_stored": false,
  "live_api_call_performed": false,
  "replay_run_performed": false
}
